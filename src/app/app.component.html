<mat-toolbar class="main-toolbar">
  <span style="flex: 1;"></span>

  <span class="toolbar-title">{{ title }}</span>

  <span style="flex: 1; text-align: right;" class="date-display">
    {{ today | date: 'fullDate':'':'fr-FR' }}
  </span>
</mat-toolbar>

<app-menu-bar [selectedIndex]="selectedIndex"></app-menu-bar>



<app-footer (navigate)="onFooterNavigate($event)"></app-footer>
